name: cPanel Package

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: mysql://user:pass@127.0.0.1:3306/gbbfashion

      - name: Build Next.js standalone
        run: npm run build
        env:
          DATABASE_URL: mysql://user:pass@127.0.0.1:3306/gbbfashion
          NEXTAUTH_URL: https://example.com
          NEXT_PUBLIC_SITE_URL: https://example.com
          NEXTAUTH_SECRET: build-time-placeholder-secret
          SSLCOMMERZ_STORE_ID: testbox
          SSLCOMMERZ_STORE_PASSWORD: qwerty
          SSLCOMMERZ_IS_LIVE: "false"
          NEXT_PUBLIC_SSLCOMMERZ_IS_LIVE: "false"

      - name: Assemble cPanel package
        run: |
          set -euo pipefail
          PKG_DIR="gbbfashion-cpanel"
          mkdir -p "$PKG_DIR"

          # Next.js standalone server output
          cp -R .next/standalone/. "$PKG_DIR/"

          # Static assets required at runtime
          mkdir -p "$PKG_DIR/.next/static"
          cp -R .next/static/. "$PKG_DIR/.next/static/"
          mkdir -p "$PKG_DIR/public"
          cp -R public/. "$PKG_DIR/public/"

          # Prisma schema for server-side DB tools
          mkdir -p "$PKG_DIR/prisma"
          cp prisma/schema.prisma "$PKG_DIR/prisma/schema.prisma"

          # Env template + start script for cPanel Node app
          cp .env.example "$PKG_DIR/.env.example"
          node -e "const fs=require('fs'); const p='$PKG_DIR/package.json'; let pkg={}; try{pkg=JSON.parse(fs.readFileSync(p,'utf8'))}catch{}; pkg.name='gbbfashion'; pkg.private=true; pkg.scripts={...(pkg.scripts||{}), start:'node server.js'}; fs.writeFileSync(p, JSON.stringify(pkg,null,2));"

          cat > "$PKG_DIR/README-CPANEL.txt" <<'EOF'
GBB Fashion — cPanel deploy package
==================================

1. Upload and extract this zip into your Node app directory
   (e.g. /home/USER/gbbfashion or the app root cPanel assigns).

2. Copy .env.example to .env and fill in:
   - DATABASE_URL
   - NEXTAUTH_URL / NEXT_PUBLIC_SITE_URL (your live domain)
   - NEXTAUTH_SECRET
   - SSLCommerz + SMTP values

3. In cPanel → Setup Node.js App:
   - Application root: this folder
   - Application startup file: server.js
   - Node.js version: 20+

4. Push the Prisma schema to MySQL once (from your PC or SSH):
   DATABASE_URL="mysql://..." npx prisma db push

5. Start / Restart the Node.js application in cPanel.
EOF

          zip -r gbbfashion-cpanel.zip "$PKG_DIR"

      - name: Upload downloadable zip
        uses: actions/upload-artifact@v4
        with:
          name: gbbfashion-cpanel
          path: gbbfashion-cpanel.zip
          if-no-files-found: error
          retention-days: 30
